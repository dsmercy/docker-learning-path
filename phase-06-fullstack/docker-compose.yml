services:

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
    container_name: phase6-api
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - phase6-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: phase6-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - phase6-net

networks:
  phase6-net:
    driver: bridge
