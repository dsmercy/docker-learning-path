services:

  # ── Local registry — push/pull images without Docker Hub ──────────────────
  registry:
    image: registry:2
    container_name: phase8-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

  # ── MongoDB ────────────────────────────────────────────────────────────────
  db:
    image: mongo:7.0
    container_name: phase8-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-products}
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - phase8-net

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      target: production
    image: phase8-api:latest
    container_name: phase8-api
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3001}
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI:-mongodb://db:27017/products}
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - phase8-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    image: phase8-frontend:latest
    container_name: phase8-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - phase8-net

volumes:
  mongo-data:
  registry-data:

networks:
  phase8-net:
    driver: bridge
