# docker-compose.prod.yml — pull CI-built images from Docker Hub instead of building locally
# Usage: docker compose -f docker-compose.prod.yml up -d

services:

  db:
    image: mongo:7.0
    container_name: phase12-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: products
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - phase12-net

  api:
    image: ${DOCKERHUB_USERNAME}/phase12-api:latest
    container_name: phase12-api
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      MONGODB_URI: mongodb://db:27017/products
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - phase12-net

  frontend:
    image: ${DOCKERHUB_USERNAME}/phase12-frontend:latest
    container_name: phase12-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - phase12-net

volumes:
  mongo-data:

networks:
  phase12-net:
    driver: bridge
