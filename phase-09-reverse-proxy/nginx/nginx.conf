# ── Upstream: two API replicas for load balancing ─────────────────────────────
# Nginx round-robins requests across all healthy upstream instances.
# When you run `docker compose up --scale api=2`, Docker creates api-1 and api-2;
# Nginx resolves the service name "api" to both container IPs automatically.
upstream api_upstream {
    server api:3001;
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# ── HTTPS server — single external entry point ────────────────────────────────
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── /api/* → Express.js API ──────────────────────────────────────────────
    location /api/ {
        # Strip the /api prefix before forwarding to the API container.
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── / → React frontend ───────────────────────────────────────────────────
    location / {
        proxy_pass       http://frontend:80;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
    }
}
